<!-- Hero Section -->
<section class="min-h-screen flex items-center relative overflow-hidden pt-24 pb-12 px-5 sm:px-8 lg:px-12">
  <div class="max-w-[1400px] mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-10 lg:gap-16 items-center">
    <!-- Text -->
    <div class="relative z-[2] text-center lg:text-left">
      <div class="hero-badge inline-flex items-center gap-2 bg-glass-bg border border-glass-border backdrop-blur-[10px] px-4 py-1.5 sm:px-5 sm:py-2 rounded-full text-[0.65rem] sm:text-[0.75rem] font-medium text-verde-bio tracking-widest uppercase mb-5 sm:mb-6 opacity-0 animate-[fade-up_0.8s_ease_0.5s_forwards]">
        <span class="w-1.5 h-1.5 rounded-full bg-verde-bio animate-[pulse-dot_2s_ease_infinite]"></span>
        {{ i18n.t().hero.badge }}
      </div>

      <h1 class="text-[clamp(2rem,6vw,5.5rem)] font-black leading-[1.05] tracking-[-1px] sm:tracking-[-2px] mb-5 sm:mb-6 opacity-0 animate-[fade-up_0.8s_ease_0.7s_forwards]">
        <span class="font-light text-text-secondary">{{ i18n.t().hero.titleLight }}</span><br>
        <span class="text-verde-bio">{{ i18n.t().hero.titleGreen }}</span><br>
        {{ i18n.t().hero.titleEnd }}
      </h1>

      <p class="text-[0.95rem] sm:text-[1.1rem] leading-relaxed text-text-sub max-w-[500px] mb-8 sm:mb-10 font-light opacity-0 animate-[fade-up_0.8s_ease_0.9s_forwards] mx-auto lg:mx-0">
        {{ i18n.t().hero.subtitle }}
      </p>

      <div class="flex flex-col sm:flex-row gap-3 sm:gap-4 items-center opacity-0 animate-[fade-up_0.8s_ease_1.1s_forwards] justify-center lg:justify-start">
        <a href="#" class="btn-primary inline-flex items-center gap-2 px-6 py-3 sm:px-8 sm:py-4 bg-[var(--color-cta-bg)] text-[var(--color-cta-text)] border-none rounded-full font-heading font-bold text-[0.85rem] sm:text-[0.95rem] cursor-pointer no-underline transition-all duration-300 relative overflow-hidden animate-[pulse-glow_3s_ease-in-out_infinite] hover:-translate-y-[3px] hover:shadow-[0_8px_30px_var(--color-cta-glow)] w-full sm:w-auto justify-center">
          <svg class="w-[16px] h-[16px] sm:w-[18px] sm:h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          {{ i18n.t().hero.cta }}
        </a>
        <a routerLink="/" fragment="funcionalidades" class="inline-flex items-center gap-2 px-6 py-3 sm:px-7 sm:py-4 bg-transparent text-branco-nuvem border border-glass-border rounded-full font-heading font-medium text-[0.85rem] sm:text-[0.95rem] cursor-pointer no-underline backdrop-blur-[10px] transition-all duration-300 hover:border-verde-bio hover:text-verde-bio hover:-translate-y-0.5 w-full sm:w-auto justify-center">
          {{ i18n.t().hero.ctaSecondary }}
        </a>
      </div>
    </div>

    <!-- Visual -->
    <div class="relative flex justify-center items-center opacity-0 animate-[fade-up_1s_ease_1.3s_forwards]">
      <!-- Orbit Rings -->
      <div class="orbit-ring orbit-ring-1">
        <div class="orbit-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-verde-bio)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8" y="8" width="8" height="8" rx="1" transform="rotate(45 12 12)" />
            <rect x="1" y="10.5" width="5" height="3" rx="0.5" />
            <rect x="18" y="10.5" width="5" height="3" rx="0.5" />
            <path d="M12 2v3" opacity="0.6" />
            <path d="M12 19v3" opacity="0.6" />
          </svg>
        </div>
      </div>
      <div class="orbit-ring orbit-ring-2">
        <div class="orbit-icon orbit-icon-2">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--color-verde-bio)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="8" y="8" width="8" height="8" rx="1" transform="rotate(45 12 12)" />
            <rect x="1" y="10.5" width="5" height="3" rx="0.5" />
            <rect x="18" y="10.5" width="5" height="3" rx="0.5" />
            <path d="M5 5l2 2" opacity="0.5" />
            <path d="M17 17l2 2" opacity="0.5" />
          </svg>
        </div>
      </div>

      <div class="phone-wrapper">
        <app-phone-mockup screen="chat" size="large" />
      </div>
    </div>
  </div>
</section>
